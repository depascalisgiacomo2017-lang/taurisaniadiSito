<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Capo-Rione - Taurisaniadi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Playfair+Display&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Playfair Display', serif;
            background-image: url('immagini/sitoBack.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
            color: #2c1810;
            min-height: 100vh;
        }

        @media (max-width: 768px) {
            body {
                background-image: url('immagini/sfondoMobile.png');
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: linear-gradient(to bottom, rgba(244, 232, 208, 0.98), rgba(235, 218, 186, 0.98));
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 0 0 8px #d4a574,
                inset 0 0 0 12px #8b6538,
                inset 0 0 0 14px #d4a574;
            border: 4px solid #8b6538;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 3px solid #8b6538;
            margin-bottom: 30px;
        }

        h1 {
            color: #2c1810;
            font-size: 2em;
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        h1::before {
            content: '🛡️ ';
            margin-right: 10px;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 20px;
            background: linear-gradient(180deg, #e8d4b0 0%, #c9a876 100%);
            border: 3px solid #8b6538;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #2c1810;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }

        .tab:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
        }

        .tab.active {
            background: linear-gradient(180deg, #8b6538 0%, #6d4c2a 100%);
            color: #f4e8d0;
        }

        .section {
            display: none;
            background: rgba(255, 253, 248, 0.9);
            padding: 25px;
            border-radius: 8px;
            border: 2px solid #d4a574;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #2c1810;
            font-family: 'Cinzel', serif;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #8b6538;
            border-radius: 5px;
            font-size: 1em;
            font-family: 'Playfair Display', serif;
            background: #fffdf8;
            color: #2c1810;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #d4a574;
            box-shadow: 0 0 5px rgba(212, 165, 116, 0.5);
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(180deg, #8b6538 0%, #6d4c2a 100%);
            color: #f4e8d0;
            border: 2px solid #5d4037;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            margin-right: 10px;
            margin-top: 10px;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }

        .btn:hover {
            background: linear-gradient(180deg, #6d4c2a 0%, #5d4037 100%);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(180deg, #c62828 0%, #b71c1c 100%);
            border: 2px solid #8b0000;
        }

        .btn-danger:hover {
            background: linear-gradient(180deg, #b71c1c 0%, #8b0000 100%);
        }

        .list-item {
            background: #fffdf8;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 5px solid #8b6538;
            border: 2px solid #d4a574;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .list-item h3 {
            color: #2c1810;
            margin-bottom: 5px;
            font-family: 'Cinzel', serif;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .message.success {
            background: #4caf50;
            color: white;
            display: block;
        }

        .message.error {
            background: #f44336;
            color: white;
            display: block;
        }

        .game-card {
            background: #fffdf8;
            border: 2px solid #8b6538;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .game-card h3 {
            color: #2c1810;
            margin-bottom: 15px;
            font-family: 'Cinzel', serif;
        }

        .player-select {
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            h1 { font-size: 1.5em; }
            header { flex-direction: column; gap: 15px; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 id="rione-title">Area Capo-Rione</h1>
            <p id="rione-subtitle"></p>
        </div>
        <button class="logout-btn" onclick="logout()">Esci</button>
    </header>

    <div id="message" class="message"></div>

    <div class="tabs">
        <button class="tab active" onclick="showSection('atleti')">🏃 Atleti</button>
        <button class="tab" onclick="showSection('formazioni')">⚔️ Formazioni</button>
        <button class="tab" onclick="showSection('chat')">💬 Chat Direttivo</button>
    </div>

    <div id="atleti" class="section active">
        <h2>Gestione Atleti</h2>
        <div class="grid-2">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="atleta-nome" placeholder="Nome">
            </div>
            <div class="form-group">
                <label>Cognome</label>
                <input type="text" id="atleta-cognome" placeholder="Cognome">
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>Età</label>
                <input type="number" id="atleta-eta" min="16" max="100">
            </div>
            <div class="form-group">
                <label>Sesso</label>
                <select id="atleta-sesso">
                    <option value="M">Maschio</option>
                    <option value="F">Femmina</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Note</label>
            <textarea id="atleta-note" placeholder="Note opzionali"></textarea>
        </div>
        <button class="btn" onclick="addAtleta()">Aggiungi Atleta</button>

        <h3 style="margin-top: 30px; margin-bottom: 15px;">Atleti del Rione</h3>
        <div id="atleti-list"></div>
    </div>

    <div id="formazioni" class="section">
        <h2>Gestione Formazioni</h2>
        <div id="formazioni-list"></div>
    </div>

    <div id="chat" class="section">
        <h2>Chat Direttivo</h2>
        <div id="chat-messages" style="max-height: 400px; overflow-y: auto; background: white; padding: 15px; border-radius: 5px; margin-bottom: 20px;"></div>

        <div class="form-group">
            <label>Messaggio</label>
            <textarea id="chat-message" placeholder="Scrivi un messaggio..."></textarea>
        </div>
        <div class="form-group">
            <label>Allega File (opzionale)</label>
            <input type="file" id="chat-file-rione" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx">
            <p style="font-size: 0.9em; color: #5d4037; margin-top: 5px;">Formati supportati: immagini, PDF, documenti Office</p>
        </div>
        <button class="btn" onclick="sendMessage()">Invia Messaggio</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="/supabase_client.js"></script>
<script type="module" src="/auth.js"></script>
<script type="module" src="/date_utils.js"></script>
<script type="module" src="/caporione_functions.js"></script>
<script type="module" src="/caporione_positions.js"></script>
<script>
    if (localStorage.getItem('userRole') !== 'caporione') {
        window.location.href = 'index.html';
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await loadData();
        setupRealtimeSubscription();

        const rioneId = localStorage.getItem('rioneId');
        const rione = window.appState.rioni.find(r => r.id === rioneId);

        if (rione) {
            document.getElementById('rione-title').textContent = `Area ${rione.nome}`;
            document.getElementById('rione-subtitle').textContent = `Gestione ${rione.nome}`;
        }

        loadAtletiList();
        loadFormazioniListWithPositions();
        loadChatMessages();
    });

    function showSection(sectionName) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

        document.getElementById(sectionName).classList.add('active');
        event.target.classList.add('active');

        if (sectionName === 'chat') loadChatMessages();
    }

    function showMessage(text, type = 'success') {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = `message ${type}`;
        setTimeout(() => {
            msg.className = 'message';
        }, 3000);
    }

    function logout() {
        window.logout();
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
