<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Capo-Rione - Taurisaniadi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f57c00 0%, #ff9800 100%);
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
            margin-bottom: 30px;
        }

        h1 {
            color: #f57c00;
            font-size: 2em;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 20px;
            background: #f5f5f5;
            border: 2px solid #f57c00;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab:hover, .tab.active {
            background: #f57c00;
            color: white;
        }

        .section {
            display: none;
            background: #f9f9f9;
            padding: 25px;
            border-radius: 8px;
        }

        .section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
        }

        .btn {
            padding: 12px 24px;
            background: #f57c00;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            margin-right: 10px;
            margin-top: 10px;
        }

        .btn:hover {
            background: #e65100;
        }

        .btn-danger {
            background: #d32f2f;
        }

        .btn-danger:hover {
            background: #b71c1c;
        }

        .list-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #f57c00;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item h3 {
            color: #f57c00;
            margin-bottom: 5px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .message.success {
            background: #4caf50;
            color: white;
            display: block;
        }

        .message.error {
            background: #f44336;
            color: white;
            display: block;
        }

        .game-card {
            background: white;
            border: 2px solid #f57c00;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .game-card h3 {
            color: #f57c00;
            margin-bottom: 15px;
        }

        .player-select {
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            h1 { font-size: 1.5em; }
            header { flex-direction: column; gap: 15px; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 id="rione-title">Area Capo-Rione</h1>
            <p id="rione-subtitle"></p>
        </div>
        <button class="logout-btn" onclick="logout()">Esci</button>
    </header>

    <div id="message" class="message"></div>

    <div class="tabs">
        <button class="tab active" onclick="showSection('atleti')">Atleti</button>
        <button class="tab" onclick="showSection('formazioni')">Formazioni</button>
        <button class="tab" onclick="showSection('chat')">Chat Direttivo</button>
    </div>

    <div id="atleti" class="section active">
        <h2>Gestione Atleti</h2>
        <div class="grid-2">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="atleta-nome" placeholder="Nome">
            </div>
            <div class="form-group">
                <label>Cognome</label>
                <input type="text" id="atleta-cognome" placeholder="Cognome">
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>Età</label>
                <input type="number" id="atleta-eta" min="16" max="100">
            </div>
            <div class="form-group">
                <label>Sesso</label>
                <select id="atleta-sesso">
                    <option value="M">Maschio</option>
                    <option value="F">Femmina</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Note</label>
            <textarea id="atleta-note" placeholder="Note opzionali"></textarea>
        </div>
        <button class="btn" onclick="addAtleta()">Aggiungi Atleta</button>

        <h3 style="margin-top: 30px; margin-bottom: 15px;">Atleti del Rione</h3>
        <div id="atleti-list"></div>
    </div>

    <div id="formazioni" class="section">
        <h2>Gestione Formazioni</h2>
        <div id="formazioni-list"></div>
    </div>

    <div id="chat" class="section">
        <h2>Chat Direttivo</h2>
        <div id="chat-messages" style="max-height: 400px; overflow-y: auto; background: white; padding: 15px; border-radius: 5px; margin-bottom: 20px;"></div>

        <div class="form-group">
            <label>Messaggio</label>
            <textarea id="chat-message" placeholder="Scrivi un messaggio..."></textarea>
        </div>
        <button class="btn" onclick="sendMessage()">Invia Messaggio</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase_client.js"></script>
<script src="auth.js"></script>
<script src="caporione_functions.js"></script>
<script>
    checkAuth('caporione');

    document.addEventListener('DOMContentLoaded', async () => {
        await loadData();

        const rioneName = sessionStorage.getItem('rioneName');
        document.getElementById('rione-title').textContent = `Area ${rioneName}`;
        document.getElementById('rione-subtitle').textContent = `Gestione ${rioneName}`;

        loadAtletiList();
        loadFormazioniList();
        loadChatMessages();
    });

    function showSection(sectionName) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

        document.getElementById(sectionName).classList.add('active');
        event.target.classList.add('active');

        if (sectionName === 'chat') loadChatMessages();
    }

    function showMessage(text, type = 'success') {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = `message ${type}`;
        setTimeout(() => {
            msg.className = 'message';
        }, 3000);
    }
</script>

</body>
</html>
