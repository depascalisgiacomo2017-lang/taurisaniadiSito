<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pannello Amministratore - Taurisaniadi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            font-size: 2em;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 20px;
            background: #f5f5f5;
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab:hover, .tab.active {
            background: #667eea;
            color: white;
        }

        .section {
            display: none;
            background: #f9f9f9;
            padding: 25px;
            border-radius: 8px;
        }

        .section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            margin-right: 10px;
            margin-top: 10px;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn-danger {
            background: #d32f2f;
        }

        .btn-danger:hover {
            background: #b71c1c;
        }

        .list-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item h3 {
            color: #667eea;
            margin-bottom: 5px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .message.success {
            background: #4caf50;
            color: white;
            display: block;
        }

        .message.error {
            background: #f44336;
            color: white;
            display: block;
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            h1 { font-size: 1.5em; }
            header { flex-direction: column; gap: 15px; align-items: flex-start; }
            .tabs { flex-direction: column; }
            .tab { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Pannello Amministratore</h1>
        <button class="logout-btn" onclick="logout()">Esci</button>
    </header>

    <div id="message" class="message"></div>

    <div class="tabs">
        <button class="tab active" onclick="showSection('rioni')">Rioni</button>
        <button class="tab" onclick="showSection('giochi')">Giochi</button>
        <button class="tab" onclick="showSection('highlights')">Momenti Salienti</button>
        <button class="tab" onclick="showSection('config')">Configurazioni</button>
    </div>

    <div id="rioni" class="section active">
        <h2>Gestione Rioni</h2>
        <div class="form-group">
            <label>Nome Rione</label>
            <input type="text" id="rione-nome" placeholder="Es: Rione Centro">
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="rione-username" placeholder="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="text" id="rione-password" placeholder="password">
            </div>
        </div>
        <div class="form-group">
            <label>Colore</label>
            <input type="color" id="rione-color" value="#FF5722">
        </div>
        <button class="btn" onclick="addRione()">Aggiungi Rione</button>

        <h3 style="margin-top: 30px; margin-bottom: 15px;">Rioni Esistenti</h3>
        <div id="rioni-list"></div>
    </div>

    <div id="giochi" class="section">
        <h2>Gestione Giochi</h2>
        <div class="form-group">
            <label>Nome Gioco</label>
            <input type="text" id="gioco-nome" placeholder="Es: Corsa dei Sacchi">
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>Luogo</label>
                <input type="text" id="gioco-luogo" placeholder="Es: Piazza Centrale">
            </div>
            <div class="form-group">
                <label>Data</label>
                <input type="date" id="gioco-data">
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>Orario Inizio</label>
                <input type="time" id="gioco-inizio">
            </div>
            <div class="form-group">
                <label>Orario Fine</label>
                <input type="time" id="gioco-fine">
            </div>
        </div>
        <div class="form-group">
            <label>Descrizione Tecnica</label>
            <textarea id="gioco-desc-tecnica" placeholder="Regole e dettagli tecnici"></textarea>
        </div>
        <div class="form-group">
            <label>Descrizione Spettatori</label>
            <textarea id="gioco-desc-spettatori" placeholder="Descrizione per il pubblico"></textarea>
        </div>
        <button class="btn" onclick="addGioco()">Aggiungi Gioco</button>

        <h3 style="margin-top: 30px; margin-bottom: 15px;">Giochi Esistenti</h3>
        <div id="giochi-list"></div>
    </div>

    <div id="highlights" class="section">
        <h2>Momenti Salienti</h2>
        <div class="form-group">
            <label>Titolo</label>
            <input type="text" id="highlight-titolo" placeholder="Titolo del momento">
        </div>
        <div class="form-group">
            <label>Descrizione</label>
            <textarea id="highlight-desc" placeholder="Descrizione"></textarea>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>URL Media</label>
                <input type="text" id="highlight-url" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select id="highlight-tipo">
                    <option value="photo">Foto</option>
                    <option value="video">Video</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Data Evento</label>
            <input type="date" id="highlight-data">
        </div>
        <button class="btn" onclick="addHighlight()">Aggiungi Momento</button>

        <h3 style="margin-top: 30px; margin-bottom: 15px;">Momenti Salienti</h3>
        <div id="highlights-list"></div>
    </div>

    <div id="config" class="section">
        <h2>Configurazioni Globali</h2>
        <div class="form-group">
            <label>Limite Bonus</label>
            <input type="number" id="config-bonus" value="3">
        </div>
        <div class="form-group">
            <label>Link WhatsApp</label>
            <input type="text" id="config-whatsapp" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Link Discord</label>
            <input type="text" id="config-discord" placeholder="https://...">
        </div>
        <button class="btn" onclick="saveConfig()">Salva Configurazioni</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase_client.js"></script>
<script src="auth.js"></script>
<script src="admin_functions.js"></script>
<script>
    checkAuth('admin');

    document.addEventListener('DOMContentLoaded', async () => {
        await loadData();
        loadRioniList();
        loadGiochiList();
        loadHighlightsList();
        loadConfigForm();
    });

    function showSection(sectionName) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

        document.getElementById(sectionName).classList.add('active');
        event.target.classList.add('active');
    }

    function showMessage(text, type = 'success') {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = `message ${type}`;
        setTimeout(() => {
            msg.className = 'message';
        }, 3000);
    }
</script>

</body>
</html>
