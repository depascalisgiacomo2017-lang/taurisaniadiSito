<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taurisaniadi 2026 - Accesso</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Playfair Display', serif;
            text-align: center;
            margin: 0;
            padding: 5vh 10px;
            background-color: #1a237e;
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .landing-container {
            background-color: #fdf5e6;
            max-width: 550px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 6px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 4px solid #c49a45;
        }

        h1.title {
            font-family: 'Cinzel', serif;
            font-size: 2.5em;
            font-weight: 800;
            color: #002b5e;
            margin: 0 0 40px 0;
            letter-spacing: 2px;
        }

        button {
            display: block;
            width: 100%;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            background-color: #f4e8c1;
            color: #3e2723;
        }

        button:hover {
            background-color: #eaddab;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .btn-main {
            font-size: 1.8em;
            padding: 30px;
            border: 4px double #5d4037;
            border-radius: 8px;
            margin-top: 10px;
            margin-bottom: 20px;
            background: linear-gradient(180deg, #fbf0d9, #eaddab);
            font-weight: 800;
            text-transform: uppercase;
        }

        .secondary-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-secondary {
            font-size: 0.8em;
            padding: 10px 15px;
            border: 1px solid #c49a45;
            border-radius: 4px;
            background: #fbf0d9;
            flex: 1;
            max-width: 180px;
        }

        .modal-overlay {
            display: none;
            background: rgba(253, 245, 230, 0.98);
            border: 2px solid #c49a45;
            padding: 20px;
            border-radius: 4px;
            margin-top: 15px;
            text-align: left;
        }

        .modal-overlay h3 {
            font-family: 'Cinzel', serif;
            color: #002b5e;
            margin-top: 0;
            border-bottom: 1px solid #c49a45;
            padding-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #bcaaa4;
            border-radius: 2px;
            font-family: 'Playfair Display', serif;
            background: #fffdf8;
            color: #3e2723;
        }

        .error-msg {
            color: #d32f2f;
            font-size: 0.85em;
            display: none;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .btn-login {
            background-color: #5d4037;
            color: #fdf5e6;
            border: 1px solid #3e2723;
            padding: 10px;
            font-size: 1em;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #3e2723;
            color: #fff;
        }

        @media (max-width: 600px) {
            .landing-container { padding: 30px 15px; }
            h1.title { font-size: 1.8em; }
            .btn-main { font-size: 1.3em; padding: 20px; }
            .btn-secondary { font-size: 0.75em; padding: 8px; }
        }
    </style>
</head>
<body>

<div class="landing-container">
    <h1 class="title">TAURISANIADI 2026</h1>

    <div class="main-actions">
        <button class="btn-main" onclick="window.location.href='spectator.html'">
            Entra nell'Avventura
        </button>
    </div>

    <div class="secondary-actions">
        <button class="btn-secondary" onclick="showAdminLogin()">
            Amministratore
        </button>
        <button class="btn-secondary" onclick="showCaporioneLogin()">
            Capo-Rione
        </button>
    </div>

    <div id="admin-login-modal" class="modal-overlay">
        <h3>Login Amministratore</h3>
        <input type="text" id="admin-user" placeholder="Nome Utente">
        <input type="password" id="admin-pass" placeholder="Password">
        <div id="login-error" class="error-msg">Credenziali non valide!</div>
        <button class="btn-login" onclick="attemptAdminLogin()">Accedi</button>
    </div>

    <div id="caporione-login-modal" class="modal-overlay">
        <h3>Accesso Capo-Rione</h3>
        <input type="text" id="caporione-user" placeholder="Nome Utente">
        <input type="password" id="caporione-pass" placeholder="Password">
        <div id="login-error-capo" class="error-msg">Credenziali non valide!</div>
        <button class="btn-login" onclick="attemptCaporioneLogin()">Accedi Area Rione</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase_client.js"></script>
<script src="auth.js"></script>

</body>
</html>
