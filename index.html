<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taurisaniadi 2026 - Accesso</title>
    <!-- Font Eleganti / Classici -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Playfair Display', serif;
            text-align: center;
            margin: 0;
            padding: 5vh 10px;
            background-color: #f0f2f5;
            background-image: url('../immagini/sitoBack.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #3e2723;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-image 0.3s ease-in-out;
        }
        
        /* Sfondo Mobile */
        @media (max-width: 600px) {
            body {
                background-image: url('../immagini/sfondoMobile.png'), url('../immagini/sitoBack.jpg');
            }
        }

        .landing-container {
            background-color: #fdf5e6; /* Colore pergamena */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgogIDxyZWN0IHdpZHRoPSI4IiBoZWlnaHQ9IjgiIGZpbGw9IiNmZGY1ZTYiPjwvcmVjdD4KICA8cGF0aCBkPSJNMCAwTDggOFoiIHN0cm9rZT0iI2YyZTljNyIgc3Ryb2tlLXdpZHRoPSIxIj48L3BhdGg+Cjwvc3ZnPg==');
            max-width: 550px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 6px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 4px solid #c49a45;
            outline: 2px solid #5d4037;
            outline-offset: -10px;
            position: relative;
        }

        h1.title {
            font-family: 'Cinzel', serif;
            font-size: 2.5em;
            font-weight: 800;
            color: #002b5e;
            margin: 0 0 40px 0;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Pulsanti base */
        button {
            display: block;
            width: 100%;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            background-color: #f4e8c1;
            color: #3e2723;
        }
        
        button:hover {
            background-color: #eaddab;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* Tasto Spettatore Gigante */
        .btn-main {
            font-size: 1.8em;
            padding: 30px;
            border: 4px double #5d4037;
            border-radius: 8px;
            margin-top: 10px;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(180deg, #fbf0d9, #eaddab);
            font-weight: 800;
            text-transform: uppercase;
        }

        .secondary-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        /* Tasti secondari */
        .btn-secondary {
            font-size: 0.8em;
            padding: 10px 15px;
            border: 1px solid #c49a45;
            border-radius: 4px;
            background: #fbf0d9;
            flex: 1;
            max-width: 180px;
        }

        /* Maschotte */
        .maschotte-img {
            max-width: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Modali login */
        .modal-overlay {
            display: none;
            background: rgba(253, 245, 230, 0.98);
            border: 2px solid #c49a45;
            padding: 20px;
            border-radius: 4px;
            margin-top: 15px;
            text-align: left;
            box-shadow: inset 0 0 15px rgba(196, 154, 69, 0.2);
        }

        .modal-overlay h3 {
            font-family: 'Cinzel', serif;
            color: #002b5e;
            margin-top: 0;
            border-bottom: 1px solid #c49a45;
            padding-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #bcaaa4;
            border-radius: 2px;
            font-family: 'Playfair Display', serif;
            background: #fffdf8;
            color: #3e2723;
        }

        .error-msg {
            color: #d32f2f;
            font-size: 0.85em;
            display: none;
            margin-bottom: 10px;
            font-weight: bold;
            font-family: 'Playfair Display', serif;
        }

        .btn-login {
            background-color: #5d4037;
            color: #fdf5e6;
            border: 1px solid #3e2723;
            padding: 10px;
            font-size: 1em;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            background-color: #3e2723;
            color: #fff;
        }

        @media (max-width: 600px) {
            .landing-container { padding: 30px 15px; outline-offset: -6px; }
            h1.title { font-size: 1.8em; margin-bottom: 30px; }
            .btn-main { font-size: 1.3em; padding: 20px; margin-bottom: 20px; }
            .secondary-actions { flex-direction: row; gap: 10px; }
            .btn-secondary { font-size: 0.75em; padding: 8px; }
            
            /* Testi scuri per mobile come da sprint */
            .landing-container { color: #000; }
            h1.title { color: #000; }
        }
    </style>
<body>

<div class="landing-container">
    <h1 class="title">TAVRISANIADI 2026</h1>

    <!-- AZIONE PRINCIPALE: SPETTATORE -->
    <div class="main-actions">
        <button class="btn-main" onclick="window.location.href='spectator.html'">
            entra nell'avventura 2026 🎭
        </button>
    </div>

    <!-- AZIONI SECONDARIE PICCOLE -->
    <div class="secondary-actions">
        <button class="btn-secondary" onclick="showAdminLogin(event)">
            amministratore 📜
        </button>
        <button class="btn-secondary" onclick="showCaporioneLogin(event)">
            capo-rione 🛡️
        </button>
    </div>
</div>

    <!-- MODALE LOGIN AMMINISTRATORE -->
    <div id="admin-login-modal" class="modal-overlay">
        <h3>Login Amministratore</h3>
        <input type="text" id="admin-user" placeholder="Nome Utente">
        <input type="password" id="admin-pass" placeholder="Password">
        <div id="login-error" class="error-msg">Credenziali non valide!</div>
        <button class="btn-login" onclick="attemptAdminLogin()">Accedi 🔑</button>
    </div>

    <!-- MODALE LOGIN CAPO RIONE -->
    <div id="caporione-login-modal" class="modal-overlay">
        <h3>Accesso Capo-Rione</h3>
        <input type="text" id="caporione-user" placeholder="Nome Utente">
        <input type="password" id="caporione-pass" placeholder="Password">
        <div id="login-error-capo" class="error-msg">Credenziali non valide!</div>
        <button class="btn-login" onclick="attemptCaporioneLogin()">Accedi Area Rione 🛡️</button>
    </div>

</div>

<!-- SCRIPT CONDIVISI -->
<script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
<script src="appwrite_adapter.js"></script>
<script src="gestore_giochi.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        if (window.supabaseClient) {
            await syncSupabaseState();
        }
    });
</script>
</body>
</html>
